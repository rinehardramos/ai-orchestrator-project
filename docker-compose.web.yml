version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: src/web/Dockerfile.web
    container_name: ai-web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://temporal:temporal@postgres:5432/orchestrator
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - TEMPORAL_HOST_URL=temporal:7233
      - PYTHONUNBUFFERED=1
    networks:
      - ai-network
    restart: unless-stopped

networks:
  ai-network:
    external: true
    name: worker_ai-network
