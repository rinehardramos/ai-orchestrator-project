version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: src/web/Dockerfile.web
    container_name: ai-web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://temporal:temporal@postgres:5432/orchestrator
    depends_on:
      - postgres
    networks:
      - ai-network

  postgres:
    image: postgres:14
    container_name: ai-postgres
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=orchestrator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  postgres_data:
