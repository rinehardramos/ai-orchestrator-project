version: "3.8"

services:
  mercenary-api:
    build:
      context: ../..
      dockerfile: src/mercenary/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MERCENARY_DATABASE_URL=postgresql://mercenary:mercenary@mercenary-db:5432/mercenary_db
      - MERCENARY_JWT_SECRET=${MERCENARY_JWT_SECRET:-dev-jwt-secret}
      - MERCENARY_SECRET_KEY=${MERCENARY_SECRET_KEY:-dev-secret-key}
      - TEMPORAL_HOST_URL=host.docker.internal:7233
      - MERCENARY_TEMPORAL_NAMESPACE=mercenary
      - CORE_API_URL=http://host.docker.internal:8000/api/internal
      - CORE_API_KEY=${CORE_API_KEY:-dev-core-api-key}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      - mercenary-db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mercenary-net

  mercenary-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - mercenary-api
    networks:
      - mercenary-net

  mercenary-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=mercenary
      - POSTGRES_PASSWORD=mercenary
      - POSTGRES_DB=mercenary_db
    volumes:
      - mercenary-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - mercenary-net

networks:
  mercenary-net:
    driver: bridge

volumes:
  mercenary-db-data:
