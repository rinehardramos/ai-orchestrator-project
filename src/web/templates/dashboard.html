{% extends "base.html" %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <h1 class="text-2xl font-semibold text-gray-900 dark:text-white mb-6">Dashboard</h1>
    
    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4" id="stats-cards" hx-get="/api/tools" hx-trigger="load" hx-swap="innerHTML">
        <div class="bg-white dark:bg-gray-800 overflow-hidden shadow rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <dt class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Total Tools</dt>
                <dd class="mt-1 text-3xl font-semibold text-gray-900 dark:text-white" id="total-count">-</dd>
            </div>
        </div>
        <div class="bg-white dark:bg-gray-800 overflow-hidden shadow rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <dt class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Enabled</dt>
                <dd class="mt-1 text-3xl font-semibold text-green-600" id="enabled-count">-</dd>
            </div>
        </div>
        <div class="bg-white dark:bg-gray-800 overflow-hidden shadow rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <dt class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Listeners</dt>
                <dd class="mt-1 text-3xl font-semibold text-blue-600" id="listener-count">-</dd>
            </div>
        </div>
        <div class="bg-white dark:bg-gray-800 overflow-hidden shadow rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <dt class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Disabled</dt>
                <dd class="mt-1 text-3xl font-semibold text-red-600" id="disabled-count">-</dd>
            </div>
        </div>
    </div>

    <script>
        document.body.addEventListener('htmx:load', function() {
            fetch('/api/tools')
                .then(r => r.json())
                .then(tools => {
                    const total = tools.length;
                    const enabled = tools.filter(t => t.enabled).length;
                    const listeners = tools.filter(t => t.listen).length;
                    const disabled = total - enabled;
                    document.getElementById('total-count').textContent = total;
                    document.getElementById('enabled-count').textContent = enabled;
                    document.getElementById('listener-count').textContent = listeners;
                    document.getElementById('disabled-count').textContent = disabled;
                });
        });
    </script>

    <div class="mt-8">
        <h2 class="text-lg font-medium text-gray-900 dark:text-white mb-4">System Health</h2>
        <div class="bg-white dark:bg-gray-800 shadow rounded-lg p-4" hx-get="/api/status" hx-trigger="load, every 30s">
            <div id="health-content" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <p class="text-gray-500 dark:text-gray-400">Loading...</p>
            </div>
        </div>
    </div>

    <div class="mt-8">
        <h2 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Quick Actions</h2>
        <div class="flex gap-4">
            <a href="/ui/tools/new" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Add Tool
            </a>
            <a href="/ui/models" class="inline-flex items-center px-4 py-2 border border-gray-300 dark:border-gray-600 text-sm font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700">
                Configure Models
            </a>
        </div>
    </div>
</div>
{% endblock %}
