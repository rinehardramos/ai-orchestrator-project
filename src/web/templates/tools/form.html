{% extends "base.html" %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <h1 class="text-2xl font-semibold text-gray-900 dark:text-white mb-6" id="page-title">
        {% if tool_name %}Edit Tool: {{ tool_name }}{% else %}Add New Tool{% endif %}
    </h1>

    <form id="tool-form" class="space-y-6 bg-white dark:bg-gray-800 shadow sm:rounded-lg p-6">
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Name</label>
                <input type="text" name="name" id="name" required
                       class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
                       {% if tool_name %}value="{{ tool_name }}" readonly{% endif %}>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Type</label>
                <input type="text" name="type" id="type" required
                       class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Module</label>
                <input type="text" name="module" id="module" required placeholder="src.tools_catalog.code.shell"
                       class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Node</label>
                <select name="node" id="node"
                        class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                    <option value="both">both</option>
                    <option value="genesis">genesis</option>
                    <option value="worker">worker</option>
                </select>
            </div>
            <div class="flex items-center">
                <input type="checkbox" name="listen" id="listen" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                <label for="listen" class="ml-2 block text-sm text-gray-900 dark:text-gray-300">Listen (always-on source)</label>
            </div>
            <div class="flex items-center">
                <input type="checkbox" name="enabled" id="enabled" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                <label for="enabled" class="ml-2 block text-sm text-gray-900 dark:text-gray-300">Enabled</label>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Description</label>
            <textarea name="description" id="description" rows="2"
                      class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Config</label>
            <div id="config-rows" class="space-y-2"></div>
            <button type="button" onclick="addConfigRow('config-rows')"
                    class="mt-2 text-sm text-indigo-600 dark:text-indigo-400 hover:text-indigo-900">+ Add Config</button>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                Credentials
                <span class="text-xs text-gray-500 dark:text-gray-400 font-normal">(encrypted, requires database)</span>
            </label>
            <div id="credential-rows" class="space-y-2"></div>
            <button type="button" onclick="addCredentialRow()"
                    class="mt-2 text-sm text-indigo-600 dark:text-indigo-400 hover:text-indigo-900">+ Add Credential</button>
            <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
                Leave value blank to keep existing credential. Enter new value to update.
            </p>
        </div>

        <div id="error-message" class="hidden text-red-600 dark:text-red-400 text-sm"></div>

        <div class="flex justify-end gap-3">
            <a href="/ui/tools" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</a>
            <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                {% if tool_name %}Update{% else %}Create{% endif %}
            </button>
        </div>
    </form>
</div>

<script>
    function addConfigRow(key = '', value = '') {
        const container = document.getElementById('config-rows');
        const row = document.createElement('div');
        row.className = 'flex gap-2 items-center';
        row.innerHTML = `
            <input type="text" placeholder="Key" value="${key}"
                   class="flex-1 rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            <input type="text" placeholder="Value" value="${value}"
                   class="flex-1 rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            <button type="button" onclick="this.parentElement.remove()" class="px-2 py-1 text-red-600 hover:text-red-900 text-sm">Remove</button>
        `;
        container.appendChild(row);
    }

    function addCredentialRow(key = '', maskedValue = '', hasExisting = false) {
        const container = document.getElementById('credential-rows');
        const row = document.createElement('div');
        row.className = 'flex gap-2 items-center';
        row.dataset.hasExisting = hasExisting;
        row.dataset.key = key;
        
        const placeholder = hasExisting ? 'Enter new value to update' : 'Value';
        
        row.innerHTML = `
            <input type="text" placeholder="Key" value="${key}" data-original-key="${key}"
                   class="credential-key flex-1 rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" ${hasExisting ? 'readonly' : ''}>
            <input type="password" placeholder="${placeholder}" value=""
                   class="credential-val flex-1 rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            ${hasExisting ? '<span class="text-xs text-green-600 dark:text-green-400 whitespace-nowrap">•••••• saved</span>' : ''}
            <button type="button" onclick="removeCredential(this)" class="px-2 py-1 text-red-600 hover:text-red-900 text-sm" title="${hasExisting ? 'Delete credential' : 'Remove'}">
                ${hasExisting ? 'Delete' : 'Remove'}
            </button>
        `;
        container.appendChild(row);
    }

    async function removeCredential(btn) {
        const row = btn.parentElement;
        const hasExisting = row.dataset.hasExisting === 'true';
        const key = row.dataset.key;
        
        if (hasExisting && key) {
            if (!confirm(`Delete credential "${key}"?`)) return;
            
            try {
                const resp = await fetch(`/api/tools/{{ tool_name }}/credentials/${encodeURIComponent(key)}`, {
                    method: 'DELETE'
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    showError(err.detail || 'Failed to delete credential');
                    return;
                }
            } catch (e) {
                showError('Failed to delete credential: ' + e.message);
                return;
            }
        }
        row.remove();
    }

    async function loadTool(name) {
        const resp = await fetch(`/api/tools/${name}`);
        if (!resp.ok) return;
        const tool = await resp.json();
        
        document.getElementById('type').value = tool.type || '';
        document.getElementById('module').value = tool.module || '';
        document.getElementById('node').value = tool.node || 'both';
        document.getElementById('listen').checked = tool.listen;
        document.getElementById('enabled').checked = tool.enabled;
        document.getElementById('description').value = tool.description || '';
        
        for (const [k, v] of Object.entries(tool.config || {})) {
            addConfigRow(k, v);
        }
        
        // Load credentials with masked values
        if (tool.credentials) {
            for (const [k, v] of Object.entries(tool.credentials)) {
                addCredentialRow(k, v, true);
            }
        }
    }
    
    async function loadToolForCopy(name) {
        const resp = await fetch(`/api/tools/${name}`);
        if (!resp.ok) return;
        const tool = await resp.json();
        
        // Update page title
        document.getElementById('page-title').textContent = `Copy Tool: ${name}`;
        
        // Set suggested name
        document.getElementById('name').value = `${name}_copy`;
        document.getElementById('name').focus();
        document.getElementById('name').select();
        
        document.getElementById('type').value = tool.type || '';
        document.getElementById('module').value = tool.module || '';
        document.getElementById('node').value = tool.node || 'both';
        document.getElementById('listen').checked = tool.listen;
        document.getElementById('enabled').checked = tool.enabled;
        document.getElementById('description').value = tool.description || '';
        
        for (const [k, v] of Object.entries(tool.config || {})) {
            addConfigRow(k, v);
        }
        
        // Show note about credentials
        const credNote = document.createElement('div');
        credNote.className = 'bg-yellow-50 dark:bg-yellow-900/20 border-l-4 border-yellow-400 p-3 mb-2';
        credNote.innerHTML = '<p class="text-sm text-yellow-700 dark:text-yellow-400">Credentials are not copied for security. Please re-enter credentials for the new tool.</p>';
        document.getElementById('credential-rows').parentElement.insertBefore(credNote, document.getElementById('credential-rows'));
    }

    function showError(msg) {
        const el = document.getElementById('error-message');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    function hideError() {
        document.getElementById('error-message').classList.add('hidden');
    }

    document.getElementById('tool-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();
        
        const config = {};
        document.querySelectorAll('#config-rows > div').forEach(row => {
            const inputs = row.querySelectorAll('input');
            const key = inputs[0].value.trim();
            const val = inputs[1].value;
            if (key) config[key] = val;
        });
        
        const credentials = {};
        const hasNewCredentials = [];
        document.querySelectorAll('#credential-rows > div').forEach(row => {
            const keyInput = row.querySelector('.credential-key');
            const valInput = row.querySelector('.credential-val');
            const key = keyInput.value.trim();
            const val = valInput.value;
            
            if (key) {
                // Only include if user entered a new value
                if (val) {
                    credentials[key] = val;
                    hasNewCredentials.push(key);
                }
                // If editing and value is empty but key exists, we keep the existing credential
                // by not including it in the update payload
            }
        });
        
        const name = document.getElementById('name').value;
        const isEdit = {{ 'true' if tool_name else 'false' }};
        
        if (isEdit) {
            // For edit, only send credentials that have new values
            const updatePayload = { config };
            if (Object.keys(credentials).length > 0) {
                updatePayload.credentials = credentials;
            }
            
            const resp = await fetch(`/api/tools/${name}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatePayload)
            });
            
            if (!resp.ok) {
                const err = await resp.json();
                showError(err.detail || 'Failed to update tool');
                return;
            }
        } else {
            // For new tool, include all fields
            const payload = {
                name: name,
                type: document.getElementById('type').value,
                module: document.getElementById('module').value,
                node: document.getElementById('node').value,
                listen: document.getElementById('listen').checked,
                enabled: document.getElementById('enabled').checked,
                description: document.getElementById('description').value,
                config: config,
                credentials: credentials
            };
            
            const resp = await fetch('/api/tools', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (!resp.ok) {
                const err = await resp.json();
                showError(err.detail || 'Failed to create tool');
                return;
            }
        }
        
        window.location.href = '/ui/tools';
    });

    {% if tool_name %}
    document.addEventListener('DOMContentLoaded', () => loadTool('{{ tool_name }}'));
    {% else %}
    document.addEventListener('DOMContentLoaded', () => {
        // Check for copy parameter
        const params = new URLSearchParams(window.location.search);
        const copyFrom = params.get('copy');
        if (copyFrom) {
            loadToolForCopy(copyFrom);
        }
    });
    {% endif %}
</script>
{% endblock %}
