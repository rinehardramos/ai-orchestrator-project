{% extends "base.html" %}
{% block content %}
<div class="px-4 py-6 sm:px-0">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Scheduled Tasks</h1>
        <a href="/ui/schedules/new" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
            + New Schedule
        </a>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4 mb-8">
        <div class="bg-white dark:bg-gray-800 overflow-hidden shadow rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <dt class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Total Schedules</dt>
                <dd class="mt-1 text-3xl font-semibold text-gray-900 dark:text-white" id="total-count">-</dd>
            </div>
        </div>
        <div class="bg-white dark:bg-gray-800 overflow-hidden shadow rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <dt class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Enabled</dt>
                <dd class="mt-1 text-3xl font-semibold text-green-600" id="enabled-count">-</dd>
            </div>
        </div>
        <div class="bg-white dark:bg-gray-800 overflow-hidden shadow rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <dt class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Running</dt>
                <dd class="mt-1 text-3xl font-semibold text-blue-600" id="running-count">-</dd>
            </div>
        </div>
        <div class="bg-white dark:bg-gray-800 overflow-hidden shadow rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <dt class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Disabled</dt>
                <dd class="mt-1 text-3xl font-semibold text-red-600" id="disabled-count">-</dd>
            </div>
        </div>
    </div>

    <!-- Schedules Table -->
    <div class="bg-white dark:bg-gray-800 shadow overflow-hidden sm:rounded-lg">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
            <thead class="bg-gray-50 dark:bg-gray-700">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Schedule</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Type</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Next Run</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Last Run</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700" id="schedules-body">
            </tbody>
        </table>
    </div>
</div>

<script>
    fetch('/api/schedules')
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('schedules-body');
            tbody.innerHTML = '';
            
            const items = data.items || [];
            
            // Update stats
            document.getElementById('total-count').textContent = data.total || items.length;
            document.getElementById('enabled-count').textContent = items.filter(t => t.enabled).length;
            document.getElementById('running-count').textContent = items.filter(t => t.status === 'running').length;
            document.getElementById('disabled-count').textContent = items.filter(t => !t.enabled).length;
            
            items.forEach(task => {
                const row = document.createElement('tr');
                const nextRun = task.next_run_at ? new Date(task.next_run_at).toLocaleString() : '-';
                const lastRun = task.last_run_at ? new Date(task.last_run_at).toLocaleString() : '-';
                
                const statusClass = {
                    'idle': 'bg-gray-100 text-gray-800',
                    'running': 'bg-blue-100 text-blue-800',
                    'paused': 'bg-yellow-100 text-yellow-800',
                    'disabled': 'bg-red-100 text-red-800',
                    'error': 'bg-red-100 text-red-800'
                }[task.status] || 'bg-gray-100 text-gray-800';
                
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900 dark:text-white">${task.name}</div>
                        <div class="text-sm text-gray-500 dark:text-gray-400">${task.description || ''}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                        ${task.schedule_type}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                        ${task.task_type}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusClass}">
                            ${task.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                        ${nextRun}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                        ${lastRun}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                        <button onclick="toggleEnable(${task.id}, ${!task.enabled})" class="text-blue-600 hover:text-blue-900 mr-2">
                            ${task.enabled ? 'Disable' : 'Enable'}
                        </button>
                        <button onclick="runNow(${task.id})" class="text-green-600 hover:text-green-900 mr-2">Run</button>
                        <a href="/ui/schedules/${task.id}" class="text-blue-600 hover:text-blue-900 mr-2">Edit</a>
                        <button onclick="deleteTask(${task.id})" class="text-red-600 hover:text-red-900">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-4 text-center text-gray-500">No scheduled tasks found</td></tr>';
            }
        });

    async function toggleEnable(id, enable) {
        await fetch(`/api/schedules/${id}/${enable ? 'enable' : 'disable'}`, {method: 'POST'});
        location.reload();
    }

    async function runNow(id) {
        await fetch(`/api/schedules/${id}/run`, {method: 'POST'});
        alert('Task triggered! It will run on the next daemon cycle.');
    }

    async function deleteTask(id) {
        if (confirm('Are you sure you want to delete this scheduled task?')) {
            await fetch(`/api/schedules/${id}`, {method: 'DELETE'});
            location.reload();
        }
    }
</script>
{% endblock %}
