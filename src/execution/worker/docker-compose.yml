version: '3.8'

services:
  temporal:
    image: temporalio/auto-setup:1.22.2
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    networks:
      - ai-network

  postgres:
    image: postgres:14
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
    ports:
      - "5432:5432"
    networks:
      - ai-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - ai-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ai-network

  # ── Execution Plane Worker ───────────────────────────────────────────────
  # Local build for rapid development.
  ai-worker:
    build:
      context: ../../../
      dockerfile: src/execution/worker/Dockerfile.worker
    container_name: ai-worker
    environment:
      - TEMPORAL_HOST_URL=temporal:7233
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - AGENT_DEFAULT_REPO=${AGENT_DEFAULT_REPO:-ssh://git@github.com/rinehardramos/workspaces.git}
      - PYTHONUNBUFFERED=1
    volumes:
      - ../../../src:/app/src
      - ../../../config:/app/config
    depends_on:
      - temporal
      - qdrant
      - redis
    networks:
      - ai-network
    restart: unless-stopped

volumes:
  qdrant_storage:

networks:
  ai-network:
    driver: bridge