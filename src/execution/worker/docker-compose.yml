version: '3.8'

services:
  temporal:
    image: temporalio/auto-setup:1.22.2
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    networks:
      - ai-network

  postgres:
    image: postgres:14
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
    ports:
      - "5432:5432"
    networks:
      - ai-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - ai-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ai-network

  # ── Execution Plane Worker ───────────────────────────────────────────────
  # Source code is mounted as a live volume so that `./scripts/reload.sh`
  # can pick up code changes by restarting the container (no image rebuild).
  # For a clean production build, run: ./scripts/deploy.sh execution
  ai-worker:
    build:
      context: ../..
      dockerfile: src/execution/worker/Dockerfile.worker
    environment:
      - TEMPORAL_HOST_URL=temporal:7233
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      # Live code mount — changes on host are reflected without image rebuild
      - ../../src:/app/src
      - ../../config:/app/config
    depends_on:
      - temporal
      - qdrant
      - redis
    networks:
      - ai-network
    restart: unless-stopped

  # ── Watchtower — Automatic Image Update & Restart ────────────────────────
  # Polls for new Docker image versions every 60s. When ai-worker's image is
  # updated (via CI/CD or `docker push`), Watchtower pulls and restarts it
  # automatically — no manual SSH or redeploy needed.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_MONITOR_ONLY=${WATCHTOWER_MONITOR_ONLY:-false}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    networks:
      - ai-network
    restart: unless-stopped

volumes:
  qdrant_storage:

networks:
  ai-network:
    driver: bridge