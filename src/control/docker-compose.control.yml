version: '3.8'

# ── Control Plane ────────────────────────────────────────────────────────────
# Responsibility: Dynamic Logic (Dispatcher, Meta-Dispatcher, Scaler)
# All services here pull from the 'control' image on GHCR.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Dispatcher (Dynamic Orchestration) ─────────────────────────────────────
  dispatcher:
    build:
      context: ../../
      dockerfile: src/control/Dockerfile.control
    image: ghcr.io/rinehardramos/ai-orchestrator-project/control:latest
    container_name: control-dispatcher
    command: ["uvicorn", "src.control.dispatcher.dispatcher:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8001:8000"
    environment:
      - TEMPORAL_HOST_URL=${TEMPORAL_HOST_URL:-temporal:7233}
      - REDIS_URL=redis://redis:6379
      - MONITOR_ENABLED=true
    networks:
      - ai-network
    restart: unless-stopped

  # ── Worker API (HTTP front for worker CRUD + task dispatch) ───────────────
  worker-api:
    build:
      context: ../../
      dockerfile: src/control/Dockerfile.control
    image: ghcr.io/rinehardramos/ai-orchestrator-project/control:latest
    container_name: control-worker-api
    command: ["uvicorn", "src.control.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8100:8000"
    environment:
      - CONTROL_API_KEY=${CONTROL_API_KEY:?CONTROL_API_KEY is required for worker-api}
      - DATABASE_URL=${DATABASE_URL:-postgresql://temporal:temporal@postgres:5432/orchestrator}
      - TEMPORAL_HOST_URL=${TEMPORAL_HOST_URL:-temporal:7233}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - REDIS_URL=redis://redis:6379
      - OFFLINE_QUEUE_DB=/app/data/offline_queue.db
    volumes:
      - ../../data:/app/data
    depends_on:
      - postgres
    networks:
      - ai-network
    restart: unless-stopped

  # ── Model Selector (Constraint-based Scaling) ──────────────────────────────
  selector:
    build:
      context: ../../
      dockerfile: src/control/Dockerfile.control
    image: ghcr.io/rinehardramos/ai-orchestrator-project/control:latest
    container_name: control-selector
    command: ["uvicorn", "src.control.model_selector.selector:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8002:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - ai-network
    restart: unless-stopped

networks:
  ai-network:
    external: true
    name: worker_ai-network
