version: '3.8'

name: opik

services:
  mysql:
    image: mysql:8.4.2
    pull_policy: always
    container_name: opik-mysql
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: opik
      MYSQL_DATABASE: opik
      MYSQL_USER: opik
      MYSQL_PASSWORD: opik
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      timeout: 1s
      interval: 1s
      retries: 300
    volumes:
      - opik-mysql:/var/lib/mysql
    networks:
      - ai-network

  redis:
    image: redis:7.2.4-alpine3.19
    pull_policy: always
    container_name: opik-redis
    hostname: opik-redis
    command: redis-server --requirepass opik
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "6379"]
      interval: 2s
      timeout: 4s
      retries: 20
      start_period: 30s
    volumes:
      - opik-redis:/data
    networks:
      - ai-network

  zookeeper:
    image: zookeeper:3.9.4
    pull_policy: always
    container_name: opik-zookeeper
    hostname: zookeeper
    user: root
    entrypoint:
      - /bin/bash
      - -c
      - |
        mkdir -p /bitnami/zookeeper/data
        chown -R zookeeper:zookeeper /bitnami/zookeeper
        exec gosu zookeeper /docker-entrypoint.sh zkServer.sh start-foreground
    environment:
      JVMFLAGS: "-Xmx512m"
      ZOO_4LW_COMMANDS_WHITELIST: "srvr,ruok"
      ZOO_DATA_DIR: /bitnami/zookeeper/data
      ZOO_DATA_LOG_DIR: /bitnami/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep -q imok"]
      interval: 1s
      timeout: 1s
      retries: 300
    volumes:
      - opik-zookeeper:/bitnami/zookeeper
    networks:
      - ai-network

  clickhouse-init:
    image: alpine:latest
    container_name: opik-clickhouse-init
    volumes:
      - ./clickhouse_config:/clickhouse_config_files
      - opik-clickhouse-config:/config
    command: |
      sh -c "
        cp -r /clickhouse_config_files/* /config/ &&
        chown -R 1000:1000 /config
      "
    networks:
      - ai-network

  clickhouse:
    image: clickhouse/clickhouse-server:25.3.6.56-alpine
    pull_policy: always
    container_name: opik-clickhouse
    hostname: clickhouse
    environment:
      CLICKHOUSE_DB: opik
      CLICKHOUSE_USER: opik
      CLICKHOUSE_PASSWORD: opik
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - opik-clickhouse:/var/lib/clickhouse
      - opik-clickhouse-server:/var/log/clickhouse-server
      - opik-clickhouse-config:/etc/clickhouse-server/config.d
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 1s
      timeout: 1s
      retries: 300
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      zookeeper:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully
    networks:
      - ai-network
    restart: always

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    pull_policy: always
    container_name: opik-minio
    hostname: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
    command: server --console-address ":9090" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 1s
      timeout: 10s
      retries: 30
      start_period: 5s
    volumes:
      - opik-minio:/data
    networks:
      - ai-network

  mc:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    pull_policy: always
    container_name: opik-mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 10s;
        /usr/bin/mc alias set s3 http://minio:9000 ${MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE} ${MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY} --api S3v4 ;
        /usr/bin/mc mb --ignore-existing s3/public;
        /usr/bin/mc anonymous set download s3/public/;
      "
    networks:
      - ai-network

  backend:
    image: ghcr.io/comet-ml/opik/opik-backend:${OPIK_VERSION:-latest}
    pull_policy: always
    container_name: opik-backend
    hostname: backend
    profiles:
      - opik
    command: ["bash", "-c", "./run_db_migrations.sh && ./entrypoint.sh"]
    environment:
      DOCKER_BUILDKIT: 1
      OPIK_ANONYMOUS_ID: ${OPIK_ANONYMOUS_ID:-}
      STATE_DB_PROTOCOL: "jdbc:mysql://"
      STATE_DB_URL: "mysql:3306/opik?createDatabaseIfNotExist=true&rewriteBatchedStatements=true"
      STATE_DB_DATABASE_NAME: opik
      STATE_DB_USER: opik
      STATE_DB_PASS: opik
      ANALYTICS_DB_MIGRATIONS_URL: "jdbc:clickhouse://clickhouse:8123"
      ANALYTICS_DB_MIGRATIONS_USER: opik
      ANALYTICS_DB_MIGRATIONS_PASS: opik
      ANALYTICS_DB_PROTOCOL: "HTTP"
      ANALYTICS_DB_HOST: "clickhouse"
      ANALYTICS_DB_PORT: 8123
      ANALYTICS_DB_DATABASE_NAME: opik
      ANALYTICS_DB_USERNAME: opik
      ANALYTICS_DB_PASS: opik
      JAVA_OPTS: "-Dliquibase.propertySubstitutionEnabled=true -XX:+UseG1GC -XX:MaxRAMPercentage=80.0"
      REDIS_URL: redis://:opik@opik-redis:6379/
      OPIK_USAGE_REPORT_ENABLED: ${OPIK_USAGE_REPORT_ENABLED:-true}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
      IS_MINIO: true
      S3_URL: http://minio:9000
      PYTHON_EVALUATOR_URL: http://python-backend:8000
      TOGGLE_GUARDRAILS_ENABLED: "false"
      TOGGLE_WELCOME_WIZARD_ENABLED: "true"
      CORS: "false"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health-check"]
      interval: 1s
      timeout: 600s
      retries: 600
      start_period: 1s
    depends_on:
      mysql:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    tmpfs:
      - /tmp
    networks:
      - ai-network

  python-backend:
    image: ghcr.io/comet-ml/opik/opik-python-backend:${OPIK_VERSION:-latest}
    pull_policy: always
    container_name: opik-python-backend
    hostname: python-backend
    profiles:
      - opik
    privileged: true
    environment:
      OPIK_VERSION: ${OPIK_VERSION:-latest}
      OPIK_REVERSE_PROXY_URL: http://frontend:5173/api
      PYTHON_BACKEND_PORT: "8000"
      REDIS_URL: redis://:opik@opik-redis:6379/0
      RQ_WORKER_ENABLED: "true"
      OPTSTUDIO_MAX_CONCURRENT_JOBS: "5"
      OPTSTUDIO_LOG_LEVEL: INFO
      OPTSTUDIO_LLM_MAX_TOKENS: "8192"
      OPIK_URL_OVERRIDE: http://backend:8080
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --spider --quiet http://127.0.0.1:8000/healthcheck"]
      interval: 2s
      timeout: 60s
      retries: 30
      start_period: 2s
    tmpfs:
      - /var/lib/docker
    networks:
      - ai-network

  frontend:
    image: ghcr.io/comet-ml/opik/opik-frontend:${OPIK_VERSION:-latest}
    pull_policy: always
    container_name: opik-frontend
    hostname: frontend
    profiles:
      - opik
    ports:
      - "5173:5173"
    volumes:
      - ./nginx_default_local.conf:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --fail-early http://localhost:5173/health"]
      interval: 1s
      timeout: 30s
      retries: 10
      start_period: 1s
    environment:
      OPIK_VERSION: ${OPIK_VERSION:-latest}
      NGINX_PORT: "5173"
    networks:
      - ai-network

volumes:
  opik-clickhouse:
  opik-clickhouse-server:
  opik-clickhouse-config:
  opik-mysql:
  opik-zookeeper:
  opik-redis:
  opik-minio:

networks:
  ai-network:
    external: true
    name: worker_ai-network
