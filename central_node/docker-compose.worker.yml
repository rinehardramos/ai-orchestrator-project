services:
  ai-worker:
    image: ai-worker:local
    env_file:
      - ../.env
    environment:
      - TEMPORAL_HOST_URL=${TEMPORAL_HOST_URL:-192.168.100.249:7233}
      - QDRANT_URL=${QDRANT_URL:-http://192.168.100.249:6333}
      - REDIS_URL=${REDIS_URL:-redis://192.168.100.249:6379}
      - OPIK_URL_OVERRIDE=${OPIK_URL_OVERRIDE:-http://192.168.100.249:8080}
      - OPIK_PROJECT_NAME=${OPIK_PROJECT_NAME:-ai-orchestration}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ../src:/app/src
      - ../config:/app/config
    networks:
      - ai-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ai-network:
    external: true
    name: worker_ai-network
