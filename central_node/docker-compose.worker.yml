services:
  ai-worker:
    image: ai-worker:local
    env_file:
      - ../.env
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-temporal}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - TEMPORAL_HOST_URL=${TEMPORAL_HOST:-temporal}:7233
      - QDRANT_URL=http://${QDRANT_HOST:-qdrant}:6333
      - REDIS_URL=redis://${REDIS_HOST:-redis}:6379
      - DATABASE_URL=postgresql://temporal:temporal@postgres:5432/ai_orchestrator
      - LMSTUDIO_HOST=${LMSTUDIO_HOST:-macbook.local}
      - LMSTUDIO_PORT=${LMSTUDIO_PORT:-1234}
      - OPIK_URL_OVERRIDE=${OPIK_URL_OVERRIDE:-http://opik-backend:8080}
      - OPIK_PROJECT_NAME=${OPIK_PROJECT_NAME:-ai-orchestration}
      - PYTHONUNBUFFERED=1
    volumes:
      - ../src:/app/src
      - ../config:/app/config
    networks:
      - ai-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ai-network:
    external: true
    name: worker_ai-network
