version: '3.8'

services:
  ai-worker:
    image: ghcr.io/rinehardramos/ai-orchestrator-project/worker:latest
    environment:
      - TEMPORAL_HOST_URL=${TEMPORAL_HOST_URL:-192.168.100.249:7233}
      - QDRANT_URL=${QDRANT_URL:-http://192.168.100.249:6333}
      - REDIS_URL=${REDIS_URL:-redis://192.168.100.249:6379}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Watchtower — Automatic Image Update & Restart ────────────────────────
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_MONITOR_ONLY=false
    restart: unless-stopped
