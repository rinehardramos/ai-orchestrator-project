version: '3.8'

services:
  # Temporal Server for Reliable Workflow Orchestration
  temporal:
    image: temporalio/auto-setup:1.22.2
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    networks:
      - ai-network

  postgres:
    image: postgres:14
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
    ports:
      - "5432:5432"
    networks:
      - ai-network

  # Qdrant for RAG & Long-Term Memory (L2)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - ai-network

  # Redis for Ephemeral State & Fast Context (L1)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ai-network

  # The AI Worker Node (Langgraph + Temporal Worker)
  ai-worker:
    build: 
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - TEMPORAL_HOST_URL=temporal:7233
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - temporal
      - qdrant
      - redis
    networks:
      - ai-network

volumes:
  qdrant_storage:

networks:
  ai-network:
    driver: bridge