# Scheduled Tasks Configuration
# 
# This file defines scheduled tasks that will be loaded into the database.
# The scheduler daemon will execute these tasks at their scheduled times.
#
# Schedule types:
#   - cron: Use standard cron expression (5 fields: minute hour day month weekday)
#   - interval: Run every N seconds
#   - once: Run once at specified time
#
# Task types:
#   - agent: AI agent task with a prompt
#   - shell: Shell command execution
#   - tool: Direct tool function call

schedules:
  # Daily email summary at 9am UTC
  daily_email_summary:
    description: "Summarize unread emails from the last 24 hours"
    schedule_type: cron
    cron_expression: "0 9 * * *"
    timezone: UTC
    task_type: agent
    task_payload:
      description: "Check gmail_blackopstech047 inbox and summarize unread emails from the last 24 hours. List sender, subject, and brief summary of each email."
      specialization: general
      max_tool_calls: 10
      max_cost_usd: 0.20
    timeout_seconds: 300
    max_failures: 3
    notify_on_success: false
    notify_on_failure: true
    tags:
      - email
      - daily

  # Hourly health check
  hourly_health_check:
    description: "Check system health endpoints every hour"
    schedule_type: interval
    interval_seconds: 3600
    task_type: shell
    task_payload:
      command: "curl -s http://localhost:8080/health 2>/dev/null || echo 'Health check failed'"
    timeout_seconds: 30
    notify_on_failure: true
    tags:
      - health
      - monitoring

  # Weekly drive report on Fridays at 5pm ET
  weekly_drive_report:
    description: "Generate weekly report of modified Drive files"
    schedule_type: cron
    cron_expression: "0 17 * * 5"
    timezone: America/New_York
    task_type: agent
    task_payload:
      description: "Search gdrive_blackopstech047 for files modified in the last 7 days. Create a summary report grouped by file type."
      specialization: general
      max_tool_calls: 20
    notify_on_success: true
    notify_on_failure: true
    tags:
      - reports
      - weekly
      - drive
