# bootstrap.yaml
#
# Minimal infrastructure config loaded at startup BEFORE anything else.
# This file is checked into git — it must NOT contain secrets or passwords.
# All sensitive values use ${ENV_VAR} references resolved from .env or environment.
#
# This is the ONLY config file the system needs to start.
# Tool configs and credentials are stored in Postgres (see migrations/001_tools_schema.sql).
# On first boot or when DB is unavailable, tools fall back to config/tools.yaml.

env: production   # "production" | "development" | "test"

# Postgres — used for tool configs, credentials, and tool registry
# The tools schema is created by: psql < migrations/001_tools_schema.sql
database_url: ${DATABASE_URL}

# Redis — used for tool config cache (TTL 60s) and task progress pub/sub
redis_url: ${REDIS_URL}

# Temporal — workflow orchestration
temporal_host: ${TEMPORAL_HOST}

# Qdrant — vector memory (L2)
qdrant_host: ${QDRANT_HOST}

# Encryption key for credentials stored in Postgres
# Generate with: python -c "import base64,os; print(base64.b64encode(os.urandom(32)).decode())"
secret_key: ${CONFIG_SECRET_KEY}
