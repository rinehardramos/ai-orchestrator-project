models:
  - id: "gemini-2.5-flash-lite"
    provider: "google"
    cost_per_1k_tokens: 0.00001
    context_window: 1000000
    reasoning_capability: "low"
    speed: "ultra_fast"
  - id: "gemini-2.5-flash"
    provider: "google"
    cost_per_1k_tokens: 0.0001
    context_window: 1000000
    reasoning_capability: "medium"
    speed: "very_fast"
  - id: "gpt-4o"
    provider: "openai"
    cost_per_1k_tokens: 0.005
    context_window: 128000
    reasoning_capability: "high"
    speed: "fast"
  - id: "claude-3-5-sonnet-20241022"
    provider: "anthropic"
    cost_per_1k_tokens: 0.003
    context_window: 200000
    reasoning_capability: "high"
    speed: "fast"
  - id: "llama-3.1-8b-local"
    provider: "lmstudio"
    cost_per_1k_tokens: 0.0
    context_window: 128000
    reasoning_capability: "low"
    speed: "fast"

infrastructure:
  - id: "gcp_cloud_run_function"
    provider: "gcp"
    cost_per_minute: 0.00002
    max_duration_minutes: 60
    max_memory_mb: 32768
    startup_time_sec: 1
    type: "serverless_container"
    best_for: "high_concurrency"
  - id: "aws_lambda_durable"
    provider: "aws"
    cost_per_minute: 0.000016
    max_duration_minutes: 525600 # 1 year suspend
    max_memory_mb: 10240
    startup_time_sec: 0.2
    type: "serverless_function"
    best_for: "stateful_burst"
  - id: "aws_ec2_spot_t4g"
    provider: "aws"
    cost_per_minute: 0.00007
    max_duration_minutes: 43200 # basically unbounded but ephemeral
    max_memory_mb: 65536
    startup_time_sec: 45
    type: "vm"
    best_for: "heavy_compute"
  - id: "local_server_docker"
    provider: "local_network"
    cost_per_minute: 0.0
    max_duration_minutes: 10080 # 1 week
    max_memory_mb: 131072 # 128GB (assuming a beefy local server)
    startup_time_sec: 5
    type: "container"
    best_for: "heavy_local_tasks"
  - id: "existing_server"
    provider: "existing_infra"
    cost_per_minute: 0.0
    max_duration_minutes: 525600
    max_memory_mb: 131072
    startup_time_sec: 1
    type: "container"
    best_for: "heavy_compute"

task_routing:
  planning:
    model: "anthropic/claude-3.5-sonnet"
    provider: "openrouter"
  coding:
    model: "zhipuai/glm-4-plus"
    provider: "openrouter"
  agent_step:
    model: "google/gemini-2.5-flash"
    provider: "lmstudio"
  analysis:
    provider: "openrouter"
    model: "google/gemini-2.0-flash-001"
  fast:
    provider: "openrouter"
    model: "google/gemini-2.0-flash-001"
  execute:
    provider: "openrouter"
    model: "google/gemini-2.0-flash-001"
  embeddings:
    provider: "lmstudio"
    model: "text-embedding-nomic-embed-code"
    dim: 3584
    collection_suffix: "_v4"

specializations:
  general:
    model: "google/gemini-2.0-flash-001"
    provider: "openrouter"
    allowed_tools: ["list_files", "read_file", "write_file", "search_web", "read_url_content", "task_complete", "git_clone", "run_command"]
  coding:
    model: "zhipuai/glm-4-plus"
    provider: "openrouter"
    allowed_tools: ["list_files", "read_file", "write_file", "run_command", "git_clone", "task_complete", "search_web"]
  research:
    model: "anthropic/claude-3.5-sonnet"
    provider: "openrouter"
    allowed_tools: ["search_web", "read_url_content", "task_complete", "write_file"]
  image_generation:
    model: "google/gemini-2.0-flash-001"
    provider: "openrouter"
    allowed_tools: ["generate_image", "task_complete"]
  video_generation:
    model: "google/gemini-2.0-flash-001"
    provider: "openrouter"
    allowed_tools: ["generate_video", "task_complete"]
  audio_generation:
    model: "google/gemini-2.0-flash-001"
    provider: "openrouter"
    allowed_tools: ["generate_audio", "task_complete"]
  planner:
    model: "anthropic/claude-3.5-sonnet"
    provider: "openrouter"
    allowed_tools: ["task_complete"]
  copywriting:
    model: "anthropic/claude-3.5-sonnet"
    provider: "openrouter"
    allowed_tools: ["write_file", "read_file", "task_complete", "submit_for_review"]
  quality_control:
    model: "anthropic/claude-3.5-sonnet"
    provider: "openrouter"
    allowed_tools: ["read_file", "task_complete", "delegate_task"]
