# ─────────────────────────────────────────────────────────────────────────────
# Cluster Node Registry
# Used by scripts/reload_all_nodes.sh and scripts/deploy.sh --remote
#
# Fields:
#   name  - Human-readable identifier
#   host  - IP or hostname (use 'localhost' for the Genesis/CNC node)
#   role  - cnc | control | execution
#   user  - SSH username (optional, defaults to current user)
#   key   - SSH private key path (optional, uses default SSH config if omitted)
# ─────────────────────────────────────────────────────────────────────────────

nodes:
  - name: genesis
    host: localhost
    role: cnc
    project_dir: /Users/rinehardramos/Projects/ai-orchestrator-project

  - name: worker-main
    host: 192.168.100.249
    role: execution
    user: rinehardramos
    project_dir: /Users/rinehardramos/Projects/ai-orchestrator-project
    # key: ~/.ssh/id_rsa   # uncomment if using a specific key

