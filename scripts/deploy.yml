---
# ─────────────────────────────────────────────────────────────────────────────
# deploy.yml — Ansible Playbook for deploying/reloading the AI Orchestrator
#
# Usage:
#   # Reload all nodes (fast, no image rebuild):
#   ansible-playbook -i scripts/inventory.py scripts/deploy.yml
#
#   # Full rebuild on execution workers only:
#   ansible-playbook -i scripts/inventory.py scripts/deploy.yml \
#     --limit execution_nodes -e "plane=execution"
#
#   # Reload a single node:
#   ansible-playbook -i scripts/inventory.py scripts/deploy.yml \
#     --limit worker-main
#
# Variables:
#   plane        (str,  default: all)    — cnc | control | execution | all | observability
#   target_hosts (str)                   — manual host limit override
# ─────────────────────────────────────────────────────────────────────────────

- name: Deploy / Reload AI Orchestrator Nodes
  hosts: "{{ target_hosts | default((plane == 'all') | ternary('all_nodes', plane + '_nodes')) }}"
  gather_facts: false
  serial: 1                   # Rolling update — one node at a time
  any_errors_fatal: false     # Continue to other nodes even if one fails

  environment: "{{ ansible_env | default({}) }}"

  vars:
    plane: "all"
    worker_container: "ai-worker"

  tasks:

    # ── Pre-flight ───────────────────────────────────────────────────────────

    - name: Check SSH connectivity
      ping:
      tags: [preflight]

    - name: Verify Docker is running
      command: docker info
      register: docker_check
      failed_when: docker_check.rc != 0
      changed_when: false
      tags: [preflight]

    - name: Verify project directory exists
      stat:
        path: "{{ project_dir }}"
      register: proj_dir
      failed_when: not proj_dir.stat.exists
      tags: [preflight]

    - name: Fix macOS Docker Keychain Error (non-interactive session)
      shell: |
        mkdir -p ~/.docker
        echo '{"credsStore": ""}' > ~/.docker/config.json
      when: ansible_host != 'localhost' and ('/Users/' in project_dir)
      tags: [preflight, fix-mac]

    # ── Pull latest code ─────────────────────────────────────────────────────

    - name: Pull latest code from origin/main
      git:
        repo: "{{ lookup('env', 'GIT_REPO') | default('') }}"
        dest: "{{ project_dir }}"
        version: main
        update: true
        force: false
      when: lookup('env', 'GIT_REPO') | default('') != ''
      tags: [sync]

    - name: Git pull (fallback when GIT_REPO not set)
      command:
        cmd: git pull --rebase origin main
        chdir: "{{ project_dir }}"
      when: lookup('env', 'GIT_REPO') | default('') == ''
      register: git_pull
      changed_when: "'Already up to date' not in git_pull.stdout"
      tags: [sync]

    - name: Show git pull result
      debug:
        msg: "{{ git_pull.stdout_lines | default(['git module used']) }}"
      tags: [sync]

    # ── Rebuild & Restart Services based on Plane ──────────────────────────

    - name: Define services and compose files for each plane
      set_fact:
        plane_config: >-
          {% if plane == 'all' %}
          {
            "services": "ai-worker collector web dispatcher selector cnc",
            "files": ["src/execution/worker/docker-compose.yml", "src/observability/docker-compose.observability.yml", "src/control/docker-compose.control.yml", "docker-compose.cnc.yml"]
          }
          {% elif plane == 'execution' %}
          {
            "services": "ai-worker",
            "files": ["src/execution/worker/docker-compose.yml"]
          }
          {% elif plane == 'observability' %}
          {
            "services": "collector web prometheus grafana cadvisor",
            "files": ["src/observability/docker-compose.observability.yml"]
          }
          {% elif plane == 'control' %}
          {
            "services": "dispatcher selector",
            "files": ["src/control/docker-compose.control.yml"]
          }
          {% elif plane == 'cnc' %}
          {
            "services": "cnc",
            "files": ["docker-compose.cnc.yml"]
          }
          {% else %}
          {"services": "", "files": []}
          {% endif %}

    - name: Build and restart with Docker Compose
      command:
        cmd: >-
          docker compose 
          {% for f in (plane_config | from_json).files %} -f {{ f }} {% endfor %}
          up -d --build --no-deps {{ (plane_config | from_json).services }}
        chdir: "{{ project_dir }}"
      environment:
        PROJECT_ROOT: "{{ project_dir }}"
        GOOGLE_API_KEY: "{{ lookup('env', 'GOOGLE_API_KEY') }}"
        OPENAI_API_KEY: "{{ lookup('env', 'OPENAI_API_KEY') }}"
        ANTHROPIC_API_KEY: "{{ lookup('env', 'ANTHROPIC_API_KEY') }}"
      when: (plane_config | from_json).services | length > 0
      tags: [build, reload]

    - name: Restart Telegram Monitor service (CNC Plane)
      become: true
      systemd:
        name: telegram-monitor
        state: restarted
      when: plane in ['all', 'cnc'] and ansible_os_family != 'Darwin'
      tags: [reload]

    # ── Verify ───────────────────────────────────────────────────────────────

    - name: Show last 15 log lines from worker
      command: docker logs {{ worker_container }} --tail 15
      register: worker_logs
      changed_when: false
      when: plane in ['all', 'execution']
      tags: [verify]

    - name: Print worker logs
      debug:
        msg: "{{ worker_logs.stderr_lines + worker_logs.stdout_lines }}"
      when: plane in ['all', 'execution']
      tags: [verify]

    - name: Check worker is listening on Temporal queue
      command: docker logs {{ worker_container }} --tail 30
      register: queue_check
      failed_when: "'Listening' not in queue_check.stderr and 'Listening' not in queue_check.stdout"
      changed_when: false
      when: plane in ['all', 'execution']
      tags: [verify]

    - name: Verify Observability Web Server is UP
      uri:
        url: "http://localhost:9090"
        status_code: 200
      register: obs_check
      until: obs_check.status == 200
      retries: 10
      delay: 5
      when: plane in ['all', 'observability']
      tags: [verify]

    - name: ✅ Node reload complete
      debug:
        msg: "Node {{ inventory_hostname }} ({{ node_name }}) reloaded successfully."
      tags: [verify]
