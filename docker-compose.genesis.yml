version: '3.8'

# ── Genesis Plane ─────────────────────────────────────────────────────────────
# Responsibility: Infrastructure provisioning, Task scheduling, Genesis Node.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Genesis Node ─────────────────────────────────────────────────────────────
  # Runs the main orchestrator/CLI inside a persistent container.
  genesis:
    build:
      context: .
      dockerfile: Dockerfile.genesis
    image: ghcr.io/rinehardramos/ai-orchestrator-project/genesis:latest
    container_name: genesis
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-temporal}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
      - ${HOME}/.pulumi:/root/.pulumi:ro
      - .:/app
    networks:
      - ai-network
    restart: unless-stopped

  # ── Telegram Ingress Service ──────────────────────────────────────────────
  # Monitors Telegram for instructions and sends them to the Control Plane.
  telegram-ingress:
    build:
      context: .
      dockerfile: Dockerfile.genesis
    container_name: telegram-ingress
    command: ["python", "src/genesis/orchestrator/telegram_monitor.py"]
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-temporal}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - .:/app
    networks:
      - ai-network
    restart: unless-stopped

networks:
  ai-network:
    external: true
    name: worker_ai-network
