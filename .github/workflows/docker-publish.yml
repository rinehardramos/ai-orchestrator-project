name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ]
  release:
    types: [ "published" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-asyncio bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements.worker.txt ]; then pip install -r requirements.worker.txt; fi
          if [ -f requirements.observability.txt ]; then pip install -r requirements.observability.txt; fi

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run security tests with Bandit
        run: |
          # Scan for common security issues in Python code
          # -r: recursive, -ll: report only medium/high severity, -ii: report only medium/high confidence
          bandit -r src/ -ll -ii

      - name: Run unit and integration tests
        run: |
          pytest tests/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component:
          - name: cnc
            file: Dockerfile.cnc
            image_suffix: cnc
          - name: control
            file: src/control/Dockerfile.control
            image_suffix: control
          - name: worker
            file: src/execution/worker/Dockerfile.worker
            image_suffix: worker
          - name: observability
            file: src/observability/Dockerfile.observability
            image_suffix: observability

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component.image_suffix }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.component.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GHA cache to speed up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
